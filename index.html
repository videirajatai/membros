<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Videira Jataí - Carregando...</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="icon" href="https://img.linkme.bio/img/2021/05/10141826/logo-videira-circulo-1.png">

    <style>
        body, html { height: 100%; margin: 0; display: flex; align-items: center; justify-content: center; background: linear-gradient(135deg, #f4f7f6 0%, #e2e8f0 100%); font-family: 'Inter', sans-serif; overflow: hidden; }
        #splash-screen { display: flex; flex-direction: column; align-items: center; justify-content: center; transition: opacity 0.4s ease; opacity: 1; }
        .splash-logo { width: 120px; animation: pulse 1.5s infinite ease-in-out; }
        #splash-screen p { margin-top: 25px; color: #2d3748; font-size: 16px; font-weight: 600; text-align: center; }
        @keyframes pulse { 0% { transform: scale(0.95); opacity: 0.8; } 50% { transform: scale(1.05); opacity: 1; } 100% { transform: scale(0.95); opacity: 0.8; } }
    </style>
</head>
<body>

    <div id="splash-screen">
        <img src="https://img.linkme.bio/img/2021/05/10141826/logo-videira-circulo-1.png" alt="Logo Videira" class="splash-logo">
        <p id="splash-texto">Iniciando sistema...</p>
    </div>

    <script>
        // CONFIGURAÇÕES DO SISTEMA
        const urlBackend = "https://script.google.com/macros/s/AKfycbxnystn3UqAKnfLUgw7tXS8CzrnpxTS0iax80rhMCRs-T47ibodGYvbRw2KRrtsnCzn/exec"; 
        const SB_URL = "https://ryvfogmfpjyamgqsltks.supabase.co"; 
        const SB_KEY = "sb_publishable_nFMOC-fPkJnsmf5_noOTBg_tKV6Cr1q";

        window.onload = function() {
            try {
                // SALVA AS CONFIGURAÇÕES
                sessionStorage.setItem('urlApi', urlBackend);
                sessionStorage.setItem('sbUrl', SB_URL);
                sessionStorage.setItem('sbKey', SB_KEY);

                const texto = document.getElementById('splash-texto');
                
                // Mudança de texto para feedback visual
                setTimeout(() => { 
                    if(texto) texto.innerText = "Conectando ao banco de dados..."; 
                }, 800);

                // Redirecionamento após 2 segundos
                setTimeout(() => {
                    const screen = document.getElementById('splash-screen');
                    if(screen) screen.style.opacity = '0';
                    
                    setTimeout(() => {
                        // Verifica se o arquivo existe antes de ir (redireciona)
                        window.location.href = "membro.html";
                    }, 400);
                }, 2000);

            } catch (e) {
                console.error("Erro no carregamento:", e);
                // Força a saída mesmo se o script der erro
                window.location.href = "membro.html";
            }
        };
    </script>
</body>
</html>
